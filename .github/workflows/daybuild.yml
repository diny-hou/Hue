# Daybuild — push to the daybuild branch for internal / preview installers.
# Prerelease only: does NOT affect /releases/latest or production auto-update.
name: Daybuild

on:
  push:
    branches:
      - daybuild
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daybuild-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (signed when secrets present)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            npm run tauri build
          } else {
            Write-Host "No signing secret — building without updater artifacts"
            npm run build:exe
          }

      - name: Resolve bundle paths
        id: bundle
        shell: pwsh
        run: |
          $nsisDir = Join-Path "src-tauri/target/release/bundle/nsis" ""
          if (-not (Test-Path $nsisDir)) {
            throw "NSIS output not found: $nsisDir"
          }
          $setup = Get-ChildItem $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No *-setup.exe in $nsisDir" }
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "SETUP_PATH=$($setup.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "SETUP_NAME=$($setup.Name)"

      - name: Build release tag
        id: tag
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString("yyyyMMdd")
          $sha = "${{ github.sha }}".Substring(0, 7)
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "TAG=daybuild-$date-$sha"

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Daybuild ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ steps.bundle.outputs.SETUP_PATH }}
