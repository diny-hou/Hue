# Product release — push a semver tag from main (e.g. v0.1.1).
# Creates a stable GitHub Release with signed installer + update.json for auto-update.
name: Release (product)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (signed bundles + updater artifacts)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing secret TAURI_SIGNING_PRIVATE_KEY"
          }
          $key = $env:TAURI_SIGNING_PRIVATE_KEY.Trim().TrimStart([char]0xFEFF)
          $path = Join-Path $env:RUNNER_TEMP "hue.key"
          [System.IO.File]::WriteAllText($path, $key, (New-Object System.Text.UTF8Encoding $false))
          if (-not (Test-Path $path) -or ((Get-Item $path).Length -lt 32)) {
            throw "Failed to write signing key file"
          }
          # Prefer path over env string (Windows secret env can mangle base64)
          $env:TAURI_SIGNING_PRIVATE_KEY_PATH = $path
          Remove-Item Env:\TAURI_SIGNING_PRIVATE_KEY -ErrorAction SilentlyContinue
          npm run tauri build

      - name: Resolve bundle paths
        id: bundle
        shell: pwsh
        run: |
          $nsisDir = Join-Path "src-tauri/target/release/bundle/nsis" ""
          if (-not (Test-Path $nsisDir)) {
            throw "NSIS output not found: $nsisDir"
          }
          $setup = Get-ChildItem $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No *-setup.exe in $nsisDir" }
          $sig = Get-Item ($setup.FullName + ".sig")
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "SETUP_PATH=$($setup.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "SETUP_NAME=$($setup.Name)"
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "SIG_PATH=$($sig.FullName)"

      - name: Strip semver v prefix for manifest
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') { $v = $Matches[1] } else { $v = $tag }
          Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8 "VERSION=$v"

      - name: Write update.json (static manifest for Tauri updater)
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SETUP_NAME: ${{ steps.bundle.outputs.SETUP_NAME }}
          SIG_PATH: ${{ steps.bundle.outputs.SIG_PATH }}
        run: |
          $url = "https://github.com/$env:REPO/releases/download/$env:TAG/$env:SETUP_NAME"
          $signature = (Get-Content -Raw $env:SIG_PATH).Trim()
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $manifest = [ordered]@{
            version = $env:VERSION
            notes   = "Release $env:TAG"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url = $url
                signature = $signature
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 update.json
          Get-Content update.json

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.bundle.outputs.SETUP_PATH }}
            ${{ steps.bundle.outputs.SIG_PATH }}
            update.json
